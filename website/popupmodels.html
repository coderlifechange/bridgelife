<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bridge Life - Professional Event Modal</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="popupmodels.css">
</head>
<body>

    <div class="modal-overlay-bridgelife-anc-pp" id="modal-bridgelife-anc-pp">
        <div class="modal-box-bridgelife-anc-pp">
            <div class="close-bridgelife-anc-pp" id="close-bridgelife-anc-pp">×</div>

            <div class="modal-img-wrapper-bridgelife-anc-pp">
                <img alt="Bridge Life Event" class="modal-img-bridgelife-anc-pp" id="img-bridgelife-anc-pp" src="">
                <div class="modal-dark-layer-bridgelife-anc-pp"></div>
                <div class="arrow-bridgelife-anc-pp prev-bridgelife-anc-pp" id="prev-bridgelife-anc-pp">❮</div>
                <div class="arrow-bridgelife-anc-pp next-bridgelife-anc-pp" id="next-bridgelife-anc-pp">❯</div>
            </div>

            <div class="modal-content-bridgelife-anc-pp">
                <div class="slogan-bridgelife-anc-pp" id="slogan-bridgelife-anc-pp"></div>
                <div class="title-bridgelife-anc-pp" id="title-bridgelife-anc-pp"></div>
                <div class="desc-bridgelife-anc-pp" id="desc-bridgelife-anc-pp"></div>
                
                <div class="datetime-bridgelife-anc-pp" id="datetime-bridgelife-anc-pp"></div>
                
                <div class="countdown-bridgelife-anc-pp" id="countdown-bridgelife-anc-pp"></div>
                
                <button class="btn-bridgelife-anc-pp" id="btn-bridgelife-anc-pp"></button>
            </div>
        </div>
    </div>

    <script src="popupmodels.js"></script>
</body>
</html>
