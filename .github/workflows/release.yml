name: Auto CI/CD + CDN Release System

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch tags
        run: git fetch --tags

      - name: Generate new version
        id: version
        run: |
          latest=$(git tag --sort=-v:refname | head -n 1)

          if [ -z "$latest" ]; then
            new_version="v1.0.0"
          else
            IFS='.' read -r major minor patch <<< "${latest#v}"
            patch=$((patch+1))
            new_version="v$major.$minor.$patch"
          fi

          echo "new_version=$new_version" >> $GITHUB_OUTPUT

      - name: Update latest.json
        run: |
          VERSION=${{ steps.version.outputs.new_version }}

          cat > latest.json <<EOF
{
  "version": "$VERSION",
  "cdn": "https://cdn.jsdelivr.net/gh/coderlifechange/bridgelife@$VERSION/popupmodels.js"
}
EOF

      - name: Commit latest.json update
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add latest.json
          git commit -m "update latest version ${{ steps.version.outputs.new_version }}" || echo "No changes"
          git push

      - name: Create Git tag
        run: |
          git tag ${{ steps.version.outputs.new_version }}
          git push origin ${{ steps.version.outputs.new_version }}